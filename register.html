<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - FinControl</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/fintech.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="assets/logo.svg" alt="FinControl">
                <h1>Crear Cuenta</h1>
                <p>Empieza a controlar tus finanzas como un profesional</p>
            </div>

            <form id="registerForm">
                <div id="generalError" class="error-msg" style="display: none; margin-bottom:10px;"></div>
                <div id="successMsg" class="success-msg" style="display: none; margin-bottom:10px;"></div>

                <div class="form-group">
                    <label class="form-label" for="fullname">Nombre Completo</label>
                    <input type="text" id="fullname" class="form-control" placeholder="Juan Pérez" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Correo Electrónico</label>
                    <input type="email" id="email" class="form-control" placeholder="tu@correo.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required
                            minlength="6">
                        <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirmar Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••"
                            required>
                    </div>
                    <div id="pwdError" class="error-msg" style="display: none;"><i
                            class="fas fa-exclamation-circle"></i> Las contraseñas no coinciden</div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;" id="registerBtn">Registrarse</button>
            </form>

            <div class="text-center mt-3" style="font-size: 0.9rem;">
                ¿Ya tienes una cuenta? <a href="login.html">Inicia sesión</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js?v=2"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/register.js"></script>
</body>

</html>
