<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FinControl</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/fintech.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="assets/logo.svg" alt="FinControl">
                <h1>Iniciar Sesión</h1>
                <p>Ingresa a tu cuenta para gestionar tus finanzas</p>
            </div>

            <form id="loginForm">
                <div id="generalError" class="error-msg" style="display: none;"></div>

                <div class="form-group">
                    <label class="form-label" for="email">Correo Electrónico</label>
                    <input type="email" id="email" class="form-control" placeholder="tu@correo.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                    </div>
                </div>

                <div
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 0.85rem;">
                    <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                        <input type="checkbox" id="rememberMe"> Recordar sesión
                    </label>
                    <a href="#" id="forgotPasswordLink">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;" id="loginBtn">Ingresar</button>
            </form>

            <div class="text-center mt-3" style="font-size: 0.9rem;">
                ¿No tienes una cuenta? <a href="register.html">Regístrate aquí</a>
            </div>
        </div>
    </div>

    <!-- Recuperar clave UI simple -->
    <div id="forgotPasswordSection" class="auth-container hidden"
        style="position: absolute; top:0; left:0; width:100%; background: var(--bg-color); z-index: 10;">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Recuperar Contraseña</h2>
                <p>Ingresa tu correo para enviarte un enlace de recuperación</p>
            </div>
            <form id="forgotForm">
                <div id="forgotError" class="error-msg" style="display: none; margin-bottom: 15px;"></div>
                <div class="form-group">
                    <label class="form-label">Correo Electrónico</label>
                    <input type="email" id="forgotEmail" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">Enviar Enlace</button>
                <button type="button" class="btn btn-outline mt-2" style="width:100%;"
                    onclick="document.getElementById('forgotPasswordSection').classList.add('hidden')">Volver</button>
            </form>
            <div id="forgotMsg" class="success-msg"></div>
        </div>
    </div>

    <!-- Restablecer clave UI simple (cuando viene del correo) -->
    <div id="resetPasswordSection" class="auth-container hidden"
        style="position: absolute; top:0; left:0; width:100%; background: var(--bg-color); z-index: 20;">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Actualizar Contraseña</h2>
                <p>Ingresa tu nueva contraseña</p>
            </div>
            <form id="resetForm">
                <div id="resetError" class="error-msg" style="display: none;"></div>
                <div class="form-group">
                    <label class="form-label">Nueva Contraseña</label>
                    <input type="password" id="newPassword" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;" id="resetBtn">Guardar Contraseña</button>
                <button type="button" class="btn btn-outline mt-2" style="width:100%;"
                    onclick="window.location.href='login.html'">Cancelar</button>
            </form>
            <div id="resetMsg" class="success-msg"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js?v=2"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
