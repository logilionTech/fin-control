<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - FinControl</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/fintech.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>
    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <img src="assets/logo.svg" alt="FinControl">
                <span>FinControl</span>
            </div>
            <ul class="nav-links">
                <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
                </li>
                <li class="nav-item"><a href="#" class="nav-link" id="navAdmin" style="display:none;"><i
                            class="fas fa-shield-alt"></i> Panel Admin</a></li>
                <li class="nav-item"><a href="payments.html" class="nav-link"><i class="fas fa-credit-card"></i>
                        Suscripción</a></li>
                <li class="nav-item"><a href="profile.html" class="nav-link active"><i class="fas fa-user"></i> Mi
                        Perfil</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="topbar">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <i class="fas fa-bars mobile-toggle" id="mobileMenuBtn"></i>
                    <h2>Configuración de Perfil</h2>
                </div>
            </div>

            <div class="panel" style="max-width: 600px;">
                <div class="text-center" style="margin-bottom: 30px;">
                    <div class="avatar" id="profileAvatar"
                        style="width:80px; height:80px; font-size:2rem; margin:auto;">U</div>
                    <h3 class="mt-2" id="profileNameDisplay">Usuario</h3>
                    <p style="color:var(--text-light);" id="profileEmailDisplay">correo@ejemplo.com</p>
                </div>

                <form id="profileForm">
                    <div id="profileMsg" class="success-msg"></div>
                    <div class="form-group">
                        <label class="form-label">Nombre Completo</label>
                        <input type="text" id="profName" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Correo Electrónico (No modificable directamente)</label>
                        <input type="email" id="profEmail" class="form-control" disabled>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Actualizar Datos</button>
                </form>

                <hr style="margin: 30px 0; border:none; border-top:1px solid #f0f2f5;">

                <h4 style="margin-bottom: 15px;">Seguridad</h4>
                <button class="btn btn-outline" id="resetPasswordBtn" style="width: 100%;"><i class="fas fa-key"></i>
                    Enviar Enlace de Restablecimiento de Contraseña</button>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js?v=2"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/profile.js"></script>
</body>

</html>
